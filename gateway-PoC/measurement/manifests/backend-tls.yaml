# backend-tls 검증용 HTTPS 백엔드. nginx가 마운트된 서버 cert(CN/SAN backend-tls.local)로
# 8443 HTTPS 서빙. cert Secret(backend-tls-cert)과 CA ConfigMap(backend-ca)은
# deploy_fixtures가 생성한다(run-round.sh). gateway가 BackendTLSPolicy로 이 백엔드에
# TLS 연결·검증하면 'backend-tls-ok' 반환.
---
apiVersion: v1
kind: ConfigMap
metadata: { name: backend-tls-nginxconf, namespace: gwtest }
data:
  default.conf: |
    server {
      listen 8443 ssl;
      http2 on;
      ssl_certificate     /certs/tls.crt;
      ssl_certificate_key /certs/tls.key;
      location / { return 200 "backend-tls-ok\n"; }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: backend-tls, namespace: gwtest }
spec:
  replicas: 1
  selector: { matchLabels: { app: backend-tls } }
  template:
    metadata: { labels: { app: backend-tls } }
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports: [ { containerPort: 8443 } ]
        volumeMounts:
        - { name: conf, mountPath: /etc/nginx/conf.d }
        - { name: certs, mountPath: /certs, readOnly: true }
      volumes:
      - { name: conf, configMap: { name: backend-tls-nginxconf } }
      - { name: certs, secret: { secretName: backend-tls-cert } }
---
apiVersion: v1
kind: Service
metadata: { name: backend-tls, namespace: gwtest }
spec:
  selector: { app: backend-tls }
  ports: [ { name: https, port: 443, targetPort: 8443, appProtocol: https } ]
